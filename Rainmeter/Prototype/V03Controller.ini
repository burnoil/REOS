[Rainmeter]
Update=-1
AccurateText=1
DynamicWindowSize=1
OnRefreshAction=[!ActivateConfig "REOS\DisplayServices" "HeaderAssemblyV03.ini"][!ActivateConfig "REOS\Modules\WorkstationHealth" "WorkstationHealthV03.ini"][!ActivateConfig "REOS\Modules\EngineeringNetwork" "EngineeringNetworkV03.ini"][!Delay 500][!Move "#HeaderX#" "#HeaderY#" "REOS\DisplayServices"][!Move "#SystemsRailX#" "#SystemsRailY#" "REOS\Modules\WorkstationHealth"][!Move "#SystemsRailX#" "#NetworkY#" "REOS\Modules\EngineeringNetwork"][!DeactivateConfig "REOS\Prototype"]

[Metadata]
Name=REOS v0.3 Prototype Controller
Author=REOS Project
Information=Loads and positions the isolated v0.3 prototype modules without disabling the existing REOS console.
Version=0.3.0

[Variables]
@IncludeLayout=#@#Layouts\LayoutEngine.inc
HealthH=(#IsCompact#=1 ? 148 : 166)
NetworkY=(#SystemsRailY#+#HealthH#+#RegionGap#)

[MeterSafety]
Meter=String
Text=REOS v0.3 prototype loading...
FontSize=10
FontColor=255,255,255,255
