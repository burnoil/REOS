[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=0
; Render with interactive REOS modules such as Application Stowage.
; ZPos 0 keeps the module above the opaque Operator Workspace while allowing
; ordinary Windows applications to cover it during normal work.
OnRefreshAction=[!Move 330 690][!ZPos 0]

@Include=#@#Variables.inc
@Include2=#@#Components\Typography.inc
@Include3=#@#Data\OperationsFeed.inc

[MeasureCPU]
Measure=CPU
Processor=0

[MeasureRAM]
Measure=PhysicalMemory

[MeasureNetIn]
Measure=NetIn
Interface=Best

[MeasureNetOut]
Measure=NetOut
Interface=Best

[MeasureOperationsFeed]
Measure=Script
ScriptFile=#@#Scripts\RotateOperations.lua

[MeterSurface]
Meter=Shape
Shape=Rectangle 0,0,720,210,5 | Fill Color #ModuleFace# | StrokeWidth 1 | Stroke Color #DividerBlue#
W=720
H=210

[MeterBand]
Meter=Shape
Shape=Rectangle 0,0,720,38,5 | Fill Color #RecessFace# | StrokeWidth 0

[MeterMarker]
Meter=Shape
Shape=Rectangle 0,0,12,38 | Fill Color #MissionBlue# | StrokeWidth 0

[MeterTitle]
Meter=String
MeterStyle=StyleEngineering
X=28
Y=11
FontSize=10
FontWeight=700
Text=OPERATIONS TELEMETRY

[MeterPart]
Meter=String
MeterStyle=StyleMuted
X=700
Y=13
StringAlign=Right
FontSize=6
Text=MODULE 740-23007 / REV B

[MeterFeedTime]
Meter=String
MeterStyle=StyleData
Group=Feed
X=28
Y=60
FontSize=9
FontColor=#DeepBlue#
Text=#CurrentFeedTime#
DynamicVariables=1

[MeterFeedSource]
Meter=String
MeterStyle=StyleSection
Group=Feed
X=92
Y=59
Text=#CurrentFeedSource#
DynamicVariables=1

[MeterFeedTitle]
Meter=String
MeterStyle=StyleEngineering
Group=Feed
X=28
Y=88
W=450
FontSize=12
FontWeight=700
ClipString=1
Text=#CurrentFeedTitle#
DynamicVariables=1

[MeterFeedRef]
Meter=String
MeterStyle=StyleMuted
Group=Feed
X=28
Y=120
W=450
FontSize=7
ClipString=1
Text=#CurrentFeedRef#
DynamicVariables=1

[MeterStateLamp]
Meter=Shape
Shape=Ellipse 30,157,5,5 | Fill Color #SafetyGreen# | StrokeWidth 1 | Stroke Color #DeepBlue#

[MeterFeedState]
Meter=String
MeterStyle=StyleData
Group=Feed
X=48
Y=148
FontSize=8
Text=#CurrentFeedState#
DynamicVariables=1

[MeterRule]
Meter=Shape
Shape=Line 506,54,506,182 | StrokeWidth 1 | Stroke Color #DividerBlue#

[MeterCPULabel]
Meter=String
MeterStyle=StyleMuted
X=530
Y=57
FontSize=7
Text=COMPUTE LOAD

[MeterCPU]
Meter=String
MeterStyle=StyleData
MeasureName=MeasureCPU
X=690
Y=54
StringAlign=Right
FontSize=13
FontWeight=700
Text=%1%

[MeterRAMLabel]
Meter=String
MeterStyle=StyleMuted
X=530
Y=94
FontSize=7
Text=MEMORY LOAD

[MeterRAM]
Meter=String
MeterStyle=StyleData
MeasureName=MeasureRAM
X=690
Y=91
StringAlign=Right
FontSize=13
FontWeight=700
Percentual=1
Text=%1%

[MeterIn]
Meter=String
MeterStyle=StyleData
MeasureName=MeasureNetIn
X=530
Y=136
FontSize=7
AutoScale=1
Text=RX  %1B/s

[MeterOut]
Meter=String
MeterStyle=StyleData
MeasureName=MeasureNetOut
X=530
Y=161
FontSize=7
AutoScale=1
Text=TX  %1B/s

[MeterFooter]
Meter=String
MeterStyle=StyleMuted
X=28
Y=188
FontSize=6
Text=LOCAL TELEMETRY / CONFIGURABLE OPERATIONS FEED / 45-SECOND RECORD INTERVAL
