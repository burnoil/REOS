[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=0

[Metadata]
Name=REOS Workstation Health v0.3
Author=REOS Project
Information=Workstation instrumentation rendered from shared REOS telemetry state.
Version=0.3.1

[Variables]
@IncludeColors=#@#Theme\Colors.inc
@IncludeTypography=#@#Theme\Typography.inc
@IncludeMaterials=#@#Theme\Materials.inc
@IncludeLayout=#@#Layouts\LayoutEngine.inc
@IncludeTelemetry=#@#Data\Telemetry.inc
ModuleW=#SystemsRailWidth#
ModuleH=(#IsCompact#=1 ? 148 : 166)
InnerX=18
GaugeW=(#ModuleW#-36)

[MeasureCPU]
Measure=Calc
Formula=#CPUPercent#
MinValue=0
MaxValue=100
DynamicVariables=1

[MeasureMemory]
Measure=Calc
Formula=#MemoryPercent#
MinValue=0
MaxValue=100
DynamicVariables=1

[MeterFrame]
Meter=Shape
Shape=Rectangle 0,0,#ModuleW#,#ModuleH#,5 | Fill Color #ConsoleStructure# | StrokeWidth 2 | Stroke Color #ConsoleSeam#
Shape2=Rectangle 8,34,(#ModuleW#-16),(#ModuleH#-42),7 | Fill Color #CRTBezel# | StrokeWidth 2 | Stroke Color #ModuleEdgeDark#
Shape3=Rectangle 13,39,(#ModuleW#-26),(#ModuleH#-52),5 | Fill Color #CRTGlass# | StrokeWidth 1 | Stroke Color #CRTGlassEdge#
DynamicVariables=1

[MeterTitlePlate]
Meter=Shape
X=10
Y=8
Shape=Rectangle 0,0,(#ModuleW#-20),28,3 | Fill Color #PlateFace# | StrokeWidth 1 | Stroke Color #PlateEdge#
DynamicVariables=1

[MeterTitle]
Meter=String
X=22
Y=13
Text=WORKSTATION HEALTH
FontFace=#FontDisplay#
FontSize=(#IsCompact#=1 ? 9 : 11)
FontColor=#LabelPlate#
AntiAlias=1
DynamicVariables=1

[MeterCPUName]
Meter=String
X=#InnerX#
Y=48
Text=PROCESSOR ACTIVITY
FontFace=#FontTechnical#
FontSize=#TypeMicroSize#
FontColor=#CRTPhosphorDim#
AntiAlias=1

[MeterCPUValue]
Meter=String
X=(#ModuleW#-18)
Y=45
Text=#CPUPercent#%
StringAlign=Right
FontFace=#FontTechnical#
FontSize=(#IsCompact#=1 ? 11 : 13)
FontColor=#CRTPhosphorBright#
AntiAlias=1
DynamicVariables=1

[MeterCPUTrack]
Meter=Shape
X=#InnerX#
Y=67
Shape=Rectangle 0,0,#GaugeW#,10,1 | Fill Color #GaugeTrack# | StrokeWidth 1 | Stroke Color #CRTGridMajor#
DynamicVariables=1

[MeterCPUBar]
Meter=Bar
MeasureName=MeasureCPU
X=(#InnerX#+1)
Y=68
W=(#GaugeW#-2)
H=8
BarOrientation=Horizontal
BarColor=#StatusNominal#
DynamicVariables=1

[MeterMemoryName]
Meter=String
X=#InnerX#
Y=87
Text=PHYSICAL MEMORY
FontFace=#FontTechnical#
FontSize=#TypeMicroSize#
FontColor=#CRTPhosphorDim#
AntiAlias=1

[MeterMemoryValue]
Meter=String
X=(#ModuleW#-18)
Y=84
Text=#MemoryUsedGB# / #MemoryTotalGB# GB   #MemoryPercent#%
StringAlign=Right
FontFace=#FontTechnical#
FontSize=(#IsCompact#=1 ? 9 : 11)
FontColor=#CRTPhosphorBright#
AntiAlias=1
DynamicVariables=1

[MeterMemoryTrack]
Meter=Shape
X=#InnerX#
Y=106
Shape=Rectangle 0,0,#GaugeW#,10,1 | Fill Color #GaugeTrack# | StrokeWidth 1 | Stroke Color #CRTGridMajor#
DynamicVariables=1

[MeterMemoryBar]
Meter=Bar
MeasureName=MeasureMemory
X=(#InnerX#+1)
Y=107
W=(#GaugeW#-2)
H=8
BarOrientation=Horizontal
BarColor=#StatusNominal#
DynamicVariables=1

[MeterUptimeLabel]
Meter=String
X=#InnerX#
Y=(#ModuleH#-28)
Text=SYSTEM ONLINE
FontFace=#FontTechnical#
FontSize=#TypeMicroSize#
FontColor=#CRTPhosphorDim#
AntiAlias=1
DynamicVariables=1

[MeterUptime]
Meter=String
X=(#ModuleW#-28)
Y=(#ModuleH#-29)
Text=#UptimeText#
StringAlign=Right
FontFace=#FontTechnical#
FontSize=(#IsCompact#=1 ? 8 : 9)
FontColor=#CRTPhosphor#
AntiAlias=1
DynamicVariables=1

[MeterStatusLamp]
Meter=Shape
X=(#ModuleW#-20)
Y=(#ModuleH#-21)
Shape=Ellipse 0,0,5,5 | Fill Color #StatusNominal# | StrokeWidth 1 | Stroke Color #LampEdge#
DynamicVariables=1
