X=#ValueX#
Y=65
W=#ValueW#
Text=#InterfaceName#
FontFace=#FontTechnical#
FontSize=#TypeDataSize#
FontColor=#CRTPhosphor#
AntiAlias=1
ClipString=1
DynamicVariables=1

[MeterLinkLabel]
Meter=String
X=22
Y=90
Text=MEDIA / LINK
FontFace=#FontTechnical#
FontSize=#TypeMicroSize#
FontColor=#CRTPhosphorDim#
AntiAlias=1

[MeterLink]
