X=(#DisplayW#-20)
Y=(#DisplayH#-20)
Shape=Ellipse 0,0,5,5 | Fill Color #StatusNominal# | StrokeWidth 1 | Stroke Color #CRTPhosphorBright#
DynamicVariables=1

[MeterNetworkStatus]
