X=22
Y=(#DisplayH#-26)
Text=EXTERNAL COMMUNICATIONS AVAILABLE
FontFace=#FontTechnical#
FontSize=#TypeMicroSize#
FontColor=#CRTPhosphorDim#
AntiAlias=1
DynamicVariables=1
