[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=0

[Metadata]
Name=REOS Engineering Network v0.3
Author=REOS Project
Information=Connected-network display rendered from shared REOS telemetry state.
Version=0.3.1

[Variables]
@IncludeColors=#@#Theme\Colors.inc
@IncludeTypography=#@#Theme\Typography.inc
@IncludeMaterials=#@#Theme\Materials.inc
@IncludeLayout=#@#Layouts\LayoutEngine.inc
@IncludeTelemetry=#@#Data\Telemetry.inc
DisplayX=0
DisplayY=4
DisplayW=#SystemsRailWidth#
DisplayH=184
DisplayTitle=ENGINEERING NETWORK
@IncludeCRT=#@#..\Components\CRTDisplay\CRTDisplayTemplate.inc

[MeterNetworkNameLabel]
Meter=String
X=22
Y=44
Text=FACILITY NETWORK
FontFace=#FontTechnical#
FontSize=#TypeMicroSize#
FontColor=#CRTPhosphorDim#
AntiAlias=1

[MeterNetworkName]
Meter=String
X=144
Y=42
W=(#DisplayW#-166)
Text=#NetworkName#
FontFace=#FontTechnical#
FontSize=#TypeDataSize#
FontColor=#CRTPhosphorBright#
AntiAlias=1
ClipString=1
DynamicVariables=1

[MeterInterfaceLabel]
Meter=String
X=22
Y=67
Text=INTERFACE
FontFace=#FontTechnical#
FontSize=#TypeMicroSize#
FontColor=#CRTPhosphorDim#
AntiAlias=1

[MeterInterface]
Meter=String
X=144
Y=65
W=(#DisplayW#-166)
Text=#InterfaceName#
FontFace=#FontTechnical#
FontSize=#TypeDataSize#
FontColor=#CRTPhosphor#
AntiAlias=1
ClipString=1
DynamicVariables=1

[MeterLinkLabel]
Meter=String
X=22
Y=90
Text=MEDIA / LINK
FontFace=#FontTechnical#
FontSize=#TypeMicroSize#
FontColor=#CRTPhosphorDim#
AntiAlias=1

[MeterLink]
Meter=String
X=144
Y=88
Text=#LinkType#  #SignalText#
FontFace=#FontTechnical#
FontSize=#TypeDataSize#
FontColor=#CRTPhosphor#
AntiAlias=1
DynamicVariables=1

[MeterIPLabel]
Meter=String
X=22
Y=113
Text=IPV4 ADDRESS
FontFace=#FontTechnical#
FontSize=#TypeMicroSize#
FontColor=#CRTPhosphorDim#
AntiAlias=1

[MeterIP]
Meter=String
X=144
Y=111
Text=#IPv4Address#
FontFace=#FontTechnical#
FontSize=#TypeDataSize#
FontColor=#CRTPhosphor#
AntiAlias=1
DynamicVariables=1

[MeterGatewayLabel]
Meter=String
X=22
Y=136
Text=GATEWAY
FontFace=#FontTechnical#
FontSize=#TypeMicroSize#
FontColor=#CRTPhosphorDim#
AntiAlias=1

[MeterGateway]
Meter=String
X=144
Y=134
Text=#Gateway#
FontFace=#FontTechnical#
FontSize=#TypeDataSize#
FontColor=#CRTPhosphor#
AntiAlias=1
DynamicVariables=1

[MeterNetworkStatusLamp]
Meter=Shape
X=(#DisplayW#-32)
Y=153
Shape=Ellipse 0,0,5,5 | Fill Color #StatusNominal# | StrokeWidth 1 | Stroke Color #CRTPhosphorBright#
DynamicVariables=1

[MeterNetworkStatus]
Meter=String
X=22
Y=153
W=(#DisplayW#-62)
Text=#NetworkStatus#
FontFace=#FontTechnical#
FontSize=#TypeMicroSize#
FontColor=#CRTPhosphorDim#
AntiAlias=1
ClipString=1
DynamicVariables=1
