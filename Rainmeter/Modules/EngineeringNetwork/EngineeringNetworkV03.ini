[Rainmeter]
Update=2000
AccurateText=1
DynamicWindowSize=0

[Metadata]
Name=REOS Engineering Network v0.3
Author=REOS Project
Information=Live connected-network display using Windows WLAN and IP telemetry.
Version=0.3.0

[Variables]
@IncludeColors=#@#Theme\Colors.inc
@IncludeTypography=#@#Theme\Typography.inc
@IncludeMaterials=#@#Theme\Materials.inc

DisplayX=0
DisplayY=4
DisplayW=356
DisplayH=184
DisplayTitle=ENGINEERING NETWORK
@IncludeCRT=#@#..\Components\CRTDisplay\CRTDisplayTemplate.inc

; Generated by REOS.Core in later builds. PowerShell measures provide an interim live source.
NetworkName=DETECTING...
InterfaceName=ENUMERATING...
LinkType=UNKNOWN
IPv4Address=---.---.---.---
Gateway=---.---.---.---
SignalText=--

[MeasureNetworkRefresh]
Measure=Plugin
Plugin=RunCommand
Program=powershell.exe
Parameter=-NoProfile -ExecutionPolicy Bypass -WindowStyle Hidden -Command "$ErrorActionPreference='SilentlyContinue'; $p=Get-NetConnectionProfile | Where-Object {$_.IPv4Connectivity -ne 'Disconnected'} | Select-Object -First 1; $a=Get-NetIPConfiguration | Where-Object {$_.IPv4DefaultGateway -and $_.NetAdapter.Status -eq 'Up'} | Select-Object -First 1; $ssid=(netsh wlan show interfaces | Select-String '^\s*SSID\s*:' | Select-Object -First 1).ToString().Split(':',2)[1].Trim(); $sig=(netsh wlan show interfaces | Select-String '^\s*Signal\s*:' | Select-Object -First 1).ToString().Split(':',2)[1].Trim(); $name=if($ssid){$ssid}elseif($p.Name){$p.Name}else{'LOCAL NETWORK'}; $type=if($ssid){'WI-FI'}else{'ETHERNET'}; $ifn=if($a.InterfaceAlias){$a.InterfaceAlias}else{'UNKNOWN'}; $ip=if($a.IPv4Address.IPAddress){$a.IPv4Address.IPAddress}else{'---.---.---.---'}; $gw=if($a.IPv4DefaultGateway.NextHop){$a.IPv4DefaultGateway.NextHop}else{'---.---.---.---'}; Write-Output ('{0}|{1}|{2}|{3}|{4}|{5}' -f $name,$ifn,$type,$ip,$gw,$sig)"
State=Hide
UpdateDivider=15
FinishAction=[!CommandMeasure MeasureNetworkParser "Parse('[MeasureNetworkRefresh]')"]

[MeasureNetworkParser]
Measure=Script
ScriptFile=#@#Scripts\ParseNetwork.lua
DynamicVariables=1

