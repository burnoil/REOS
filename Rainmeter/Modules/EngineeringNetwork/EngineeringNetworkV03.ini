[Rainmeter]
Update=2000
AccurateText=1
DynamicWindowSize=0

[Metadata]
Name=REOS Engineering Network v0.3
Author=REOS Project
Information=Live connected-network display using Windows WLAN and IP telemetry.
Version=0.3.0

[Variables]
@IncludeColors=#@#Theme\Colors.inc
@IncludeTypography=#@#Theme\Typography.inc
@IncludeMaterials=#@#Theme\Materials.inc
@IncludeLayout=#@#Layouts\LayoutEngine.inc

DisplayX=0
DisplayY=0
DisplayW=#SystemsRailWidth#
DisplayH=(#IsCompact#=1 ? 174 : 184)
DisplayTitle=ENGINEERING NETWORK
@IncludeCRT=#@#..\Components\CRTDisplay\CRTDisplayTemplate.inc

NetworkName=DETECTING...
InterfaceName=ENUMERATING...
LinkType=UNKNOWN
IPv4Address=---.---.---.---
Gateway=---.---.---.---
SignalText=--
ValueX=(#DisplayW#*0.41)
ValueW=(#DisplayW#-#ValueX#-22)

[MeasureNetworkRefresh]
Measure=Plugin
Plugin=RunCommand
Program=powershell.exe
Parameter=-NoProfile -ExecutionPolicy Bypass -WindowStyle Hidden -Command "$ErrorActionPreference='SilentlyContinue'; $p=Get-NetConnectionProfile | Where-Object {$_.IPv4Connectivity -ne 'Disconnected'} | Select-Object -First 1; $a=Get-NetIPConfiguration | Where-Object {$_.IPv4DefaultGateway -and $_.NetAdapter.Status -eq 'Up'} | Select-Object -First 1; $w=netsh wlan show interfaces; $ssid=($w | Select-String '^\s*SSID\s*:' | Select-Object -First 1).ToString().Split(':',2)[1].Trim(); $sig=($w | Select-String '^\s*Signal\s*:' | Select-Object -First 1).ToString().Split(':',2)[1].Trim(); $name=if($ssid){$ssid}elseif($p.Name){$p.Name}else{'LOCAL NETWORK'}; $type=if($ssid){'WI-FI'}else{'ETHERNET'}; $ifn=if($a.InterfaceAlias){$a.InterfaceAlias}else{'UNKNOWN'}; $ip=if($a.IPv4Address.IPAddress){$a.IPv4Address.IPAddress}else{'---.---.---.---'}; $gw=if($a.IPv4DefaultGateway.NextHop){$a.IPv4DefaultGateway.NextHop}else{'---.---.---.---'}; Write-Output ('{0}|{1}|{2}|{3}|{4}|{5}' -f $name,$ifn,$type,$ip,$gw,$sig)"
State=Hide
UpdateDivider=15
FinishAction=[!CommandMeasure MeasureNetworkParser "Parse('[MeasureNetworkRefresh]')"]

[MeasureNetworkParser]
Measure=Script
ScriptFile=#@#Scripts\ParseNetwork.lua
DynamicVariables=1

[MeterNetworkNameLabel]
Meter=String
X=22
Y=44
Text=FACILITY NETWORK
FontFace=#FontTechnical#
FontSize=#TypeMicroSize#
FontColor=#CRTPhosphorDim#
AntiAlias=1

[MeterNetworkName]
Meter=String
X=#ValueX#
Y=42
W=#ValueW#
Text=#NetworkName#
FontFace=#FontTechnical#
FontSize=#TypeDataSize#
FontColor=#CRTPhosphorBright#
AntiAlias=1
ClipString=1
DynamicVariables=1

[MeterInterfaceLabel]
Meter=String
X=22
Y=67
Text=INTERFACE
FontFace=#FontTechnical#
FontSize=#TypeMicroSize#
FontColor=#CRTPhosphorDim#
AntiAlias=1

[MeterInterface]
