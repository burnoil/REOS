[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=0
OnRefreshAction=[!Move 330 900][!ZPos -2]

@Include=#@#Variables.inc
@Include2=#@#Components\Typography.inc

[Variables]
Slot1Handle=0
Slot1Title=
Slot2Handle=0
Slot2Title=
Slot3Handle=0
Slot3Title=
Slot4Handle=0
Slot4Title=
Slot5Handle=0
Slot5Title=
Slot6Handle=0
Slot6Title=

[MeasureWindowList]
Measure=Plugin
Plugin=RunCommand
Program=powershell.exe
Parameter=-NoProfile -ExecutionPolicy Bypass -File "#@#Scripts\WindowState.ps1" -Mode List -Maximum 6
State=Hide
OutputType=UTF8
UpdateDivider=5

[MeasureStowageParser]
Measure=Script
ScriptFile=#@#Scripts\Stowage.lua
UpdateDivider=1

[MeterSurface]
Meter=Shape
Shape=Rectangle 0,0,1152,108,5 | Fill Color #EquipmentCream# | StrokeWidth 1 | Stroke Color #DividerBlue#
W=1152
H=108

[MeterBand]
Meter=Shape
Shape=Rectangle 0,0,1152,31,5 | Fill Color #RecessFace# | StrokeWidth 0

[MeterMarker]
Meter=Shape
Shape=Rectangle 0,0,10,31 | Fill Color #MissionBlue# | StrokeWidth 0

[MeterTitle]
Meter=String
MeterStyle=StyleEngineering
X=24
Y=8
FontSize=9
FontWeight=700
Text=APPLICATION STOWAGE

[MeterPart]
Meter=String
MeterStyle=StyleMuted
X=1134
Y=9
StringAlign=Right
FontSize=6
Text=ASSEMBLY 750-11802 / REV A

[MeterEmpty]
Meter=String
MeterStyle=StyleData
Group=Stowage
X=24
Y=60
FontSize=9
FontColor=#TextGray#
Text=NO APPLICATIONS STOWED
Hidden=0

; Slot 1
[MeterSlot1]
Meter=Shape
Group=Stowage
Shape=Rectangle 18,43,174,47,3 | Fill Color #ModuleFace# | StrokeWidth 1 | Stroke Color #DividerBlue#
LeftMouseUpAction=["powershell.exe" -WindowStyle Hidden -NoProfile -ExecutionPolicy Bypass -File "#@#Scripts\WindowState.ps1" -Mode Restore -Handle #Slot1Handle#]
DynamicVariables=1
Hidden=1
[MeterSlot1Lamp]
Meter=Shape
Group=Stowage
Shape=Ellipse 31,65,5,5 | Fill Color #SafetyGreen# | StrokeWidth 1 | Stroke Color #DeepBlue#
Hidden=1
