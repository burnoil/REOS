[Rainmeter]
Update=2000
AccurateText=1
DynamicWindowSize=1
Draggable=0
KeepOnScreen=1
OnRefreshAction=[!Move 330 920][!ZPos 0][!CommandMeasure MeasureStowageFeed "Run"]
OnUpdateAction=[!CommandMeasure MeasureStowageFeed "Run"]

@Include=#@#Variables.inc
@Include2=#@#Components\Typography.inc

[MeasureStowageFeed]
Measure=Plugin
Plugin=RunCommand
Program=cmd.exe
Parameter=/D /Q /C type "%LOCALAPPDATA%\REOS\stowage.txt" 2^>nul
State=Hide
OutputType=UTF8
FinishAction=[!UpdateMeter MeterFeed][!Redraw]

[MeterSurface]
Meter=Shape
Shape=Rectangle 0,0,1152,88,5 | Fill Color #EquipmentCream# | StrokeWidth 2 | Stroke Color #DeepBlue#
W=1152
H=88

[MeterBand]
Meter=Shape
Shape=Rectangle 0,0,1152,29,5 | Fill Color #RecessFace# | StrokeWidth 0

[MeterMarker]
Meter=Shape
Shape=Rectangle 0,0,10,29 | Fill Color #MissionBlue# | StrokeWidth 0

[MeterTitle]
Meter=String
MeterStyle=StyleEngineering
X=24
Y=7
FontSize=9
FontWeight=700
Text=APPLICATION STOWAGE

[MeterPart]
Meter=String
MeterStyle=StyleMuted
X=1134
Y=8
StringAlign=Right
FontSize=6
Text=ASSEMBLY 750-11802 / REV F

[MeterInstruction]
Meter=String
MeterStyle=StyleData
X=24
Y=39
FontSize=7
FontColor=#TextGray#
Text=REOS.CORE APPLICATION STATE / UPDATE INTERVAL 2 SEC

[MeterFeed]
Meter=String
MeterStyle=StyleData
MeasureName=MeasureStowageFeed
X=24
Y=59
W=1100
H=18
FontSize=8
FontColor=#DeepBlue#
ClipString=1
Text=%1
