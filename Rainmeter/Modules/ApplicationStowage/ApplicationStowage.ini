[Rainmeter]
Update=2000
AccurateText=1
DynamicWindowSize=0
Draggable=0
KeepOnScreen=1
ClickThrough=0
SnapEdges=0
OnRefreshAction=[!Move 330 920][!ZPos 0]

@Include=#@#Variables.inc
@Include2=#@#Components\Typography.inc

[MeasureStowageFeed]
Measure=Script
ScriptFile=#@#Scripts\ReadStowageFeed.lua
UpdateDivider=1

; This skin is the content insert for the recessed dock rendered by OperatorWorkspace.
; It intentionally has no floating-card border or rounded outer shell.
[MeterDockFace]
Meter=Shape
Shape=Rectangle 0,0,1152,88 | Fill Color #EquipmentCream# | StrokeWidth 0
W=1152
H=88

[MeterBand]
Meter=Shape
Shape=Rectangle 0,0,1152,29 | Fill Color #RecessFace# | StrokeWidth 0

[MeterMarker]
Meter=Shape
Shape=Rectangle 0,0,10,29 | Fill Color #MissionBlue# | StrokeWidth 0

[MeterTitle]
Meter=String
MeterStyle=StyleEngineering
X=24
Y=7
FontSize=9
FontWeight=700
Text=APPLICATION STOWAGE

[MeterPart]
Meter=String
MeterStyle=StyleMuted
X=1134
Y=8
StringAlign=Right
FontSize=6
Text=ASSEMBLY 750-11802 / REV H

[MeterInstruction]
Meter=String
MeterStyle=StyleData
X=24
Y=39
FontSize=7
FontColor=#TextGray#
Text=REOS.CORE APPLICATION STATE / FIXED OPERATOR-SURFACE DOCK / UPDATE INTERVAL 2 SEC

[MeterFeed]
Meter=String
MeterStyle=StyleData
MeasureName=MeasureStowageFeed
X=24
Y=59
W=1100
H=18
FontSize=8
FontColor=#DeepBlue#
ClipString=1
Text=%1
