[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
Draggable=0
KeepOnScreen=1
OnRefreshAction=[!Move 330 780][!ZPos 0][!CommandMeasure MeasureWindowList "Run"]

@Include=#@#Variables.inc
@Include2=#@#Components\Typography.inc

[MeasureWindowList]
Measure=Plugin
Plugin=RunCommand
Program=powershell.exe
Parameter=-NoProfile -WindowStyle Hidden -ExecutionPolicy Bypass -File "#@#Scripts\WindowState.ps1" -Mode List -Maximum 6
State=Hide
OutputType=UTF8
UpdateDivider=5
FinishAction=[!UpdateMeter MeterRawOutput][!Redraw]

[MeterSurface]
Meter=Shape
Shape=Rectangle 0,0,1152,108,5 | Fill Color #EquipmentCream# | StrokeWidth 2 | Stroke Color #DeepBlue#
W=1152
H=108

[MeterBand]
Meter=Shape
Shape=Rectangle 0,0,1152,31,5 | Fill Color #RecessFace# | StrokeWidth 0

[MeterMarker]
Meter=Shape
Shape=Rectangle 0,0,10,31 | Fill Color #MissionBlue# | StrokeWidth 0

[MeterTitle]
Meter=String
MeterStyle=StyleEngineering
X=24
Y=8
FontSize=9
FontWeight=700
Text=APPLICATION STOWAGE / DIAGNOSTIC MODE

[MeterPart]
Meter=String
MeterStyle=StyleMuted
X=1134
Y=9
StringAlign=Right
FontSize=6
Text=ASSEMBLY 750-11802 / REV B

[MeterInstruction]
Meter=String
MeterStyle=StyleData
X=24
Y=43
FontSize=8
FontColor=#TextGray#
Text=MINIMIZE AN APPLICATION. DETECTION REFRESH: 5 SECONDS.

[MeterRawOutput]
Meter=String
MeterStyle=StyleData
MeasureName=MeasureWindowList
X=24
Y=67
W=1100
H=30
FontSize=8
FontColor=#DeepBlue#
ClipString=2
Text=%1

[MeterEmpty]
Meter=String
MeterStyle=StyleMuted
X=24
Y=88
FontSize=7
Text=EMPTY OUTPUT INDICATES THE WINDOW HELPER DETECTED NO MINIMIZED TOP-LEVEL APPLICATIONS.
