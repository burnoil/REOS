[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
Draggable=0
KeepOnScreen=1
; Reserved strip above the 60 px System Status Bus on the 1920x1080 baseline.
; Program Operations ends well above this position; the bay must not float over briefing modules.
OnRefreshAction=[!Move 330 920][!ZPos 0][!CommandMeasure MeasureWindowList "Run"]

@Include=#@#Variables.inc
@Include2=#@#Components\Typography.inc

[MeasureWindowList]
Measure=Plugin
Plugin=RunCommand
Program=powershell.exe
Parameter=-NoProfile -WindowStyle Hidden -ExecutionPolicy Bypass -File "#@#Scripts\WindowState.ps1" -Mode List -Maximum 6
State=Hide
OutputType=UTF8
UpdateDivider=5
Substitute="\r\n":"   //   ","\n":"   //   ","\r":"   //   "
FinishAction=[!UpdateMeter MeterRawOutput][!Redraw]

[MeterSurface]
Meter=Shape
Shape=Rectangle 0,0,1152,88,5 | Fill Color #EquipmentCream# | StrokeWidth 2 | Stroke Color #DeepBlue#
W=1152
H=88

[MeterBand]
Meter=Shape
Shape=Rectangle 0,0,1152,29,5 | Fill Color #RecessFace# | StrokeWidth 0

[MeterMarker]
Meter=Shape
Shape=Rectangle 0,0,10,29 | Fill Color #MissionBlue# | StrokeWidth 0

[MeterTitle]
Meter=String
MeterStyle=StyleEngineering
X=24
Y=7
FontSize=9
FontWeight=700
Text=APPLICATION STOWAGE / DIAGNOSTIC MODE

[MeterPart]
Meter=String
MeterStyle=StyleMuted
X=1134
Y=8
StringAlign=Right
FontSize=6
Text=ASSEMBLY 750-11802 / REV D

[MeterInstruction]
Meter=String
MeterStyle=StyleData
X=24
Y=39
FontSize=7
FontColor=#TextGray#
Text=MINIMIZE APPLICATIONS / ALL DETECTED RECORDS SHOWN LEFT-TO-RIGHT / REFRESH 5 SEC

[MeterRawOutput]
Meter=String
MeterStyle=StyleData
MeasureName=MeasureWindowList
X=24
Y=59
W=1100
H=18
FontSize=8
FontColor=#DeepBlue#
ClipString=1
Text=%1

[MeterEmpty]
Meter=String
MeterStyle=StyleMuted
X=710
Y=61
W=410
StringAlign=Right
FontSize=6
Text=EMPTY OUTPUT = NO MINIMIZED WINDOW DETECTED
