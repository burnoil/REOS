[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=0
OnRefreshAction=[!Move #NavW# #HeaderH#][!ZPos -1]

@Include=#@#Variables.inc
@Include2=#@#Components\Typography.inc

[MeterSurface]
Meter=Shape
Shape=Rectangle 0,0,(#ScreenW#-#NavW#-#RailW#),#BodyH# | Fill Color #ConsoleSurface# | StrokeWidth 0
W=(#ScreenW#-#NavW#-#RailW#)
H=#BodyH#

[MeterTopRecess]
Meter=Shape
Shape=Rectangle 0,0,(#ScreenW#-#NavW#-#RailW#),9 | Fill Color #RecessFace# | StrokeWidth 0

[MeterGridV1]
Meter=Shape
Shape=Line 96,0,96,#BodyH# | StrokeWidth 1 | Stroke Color 170,183,181,100
[MeterGridV2]
Meter=Shape
Shape=Line 460,0,460,#BodyH# | StrokeWidth 1 | Stroke Color 170,183,181,100
[MeterGridV3]
Meter=Shape
Shape=Line 824,0,824,#BodyH# | StrokeWidth 1 | Stroke Color 170,183,181,100
[MeterGridH1]
Meter=Shape
Shape=Line 0,205,(#ScreenW#-#NavW#-#RailW#),205 | StrokeWidth 1 | Stroke Color 170,183,181,90
[MeterGridH2]
Meter=Shape
Shape=Line 0,572,(#ScreenW#-#NavW#-#RailW#),572 | StrokeWidth 1 | Stroke Color 170,183,181,90

