[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=0
OnRefreshAction=[!Move #NavW# #HeaderH#][!ZPos -2]

@Include=#@#Variables.inc
@Include2=#@#Components\Typography.inc

; REOS operator surface ownership:
; top row = operational context
; center = quiet application workspace
; lower context strip = current program
; bottom recessed bay = Application Stowage dock

[MeterSurface]
Meter=Shape
Shape=Rectangle 0,0,(#ScreenW#-#NavW#-#RailW#),#BodyH# | Fill Color #ConsoleSurface# | StrokeWidth 0
W=(#ScreenW#-#NavW#-#RailW#)
H=#BodyH#

[MeterTopRecess]
Meter=Shape
Shape=Rectangle 0,0,(#ScreenW#-#NavW#-#RailW#),9 | Fill Color #RecessFace# | StrokeWidth 0

[MeterDatumV1]
Meter=Shape
Shape=Line 96,0,96,#BodyH# | StrokeWidth 1 | Stroke Color 170,183,181,70
[MeterDatumV2]
Meter=Shape
Shape=Line 824,0,824,#BodyH# | StrokeWidth 1 | Stroke Color 170,183,181,70
[MeterDatumH1]
Meter=Shape
Shape=Line 0,312,(#ScreenW#-#NavW#-#RailW#),312 | StrokeWidth 1 | Stroke Color 170,183,181,70
[MeterDatumH2]
Meter=Shape
Shape=Line 0,650,(#ScreenW#-#NavW#-#RailW#),650 | StrokeWidth 1 | Stroke Color 170,183,181,70

