[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=0
OnRefreshAction=[!Move 0 0][!ZPos -2]
RightMouseUpAction=[!SkinCustomMenu]
ContextTitle=Edit REOS Configuration
ContextAction=["notepad.exe" "#@#Variables.inc"]
ContextTitle2=Restore Windows Interface
ContextAction2=["powershell.exe" -NoProfile -ExecutionPolicy Bypass -File "#@#Scripts\RestoreWindowsUI.ps1"]

@Include=#@#Variables.inc
@Include2=#@#Components\Typography.inc

[MeasureTime]
Measure=Time
Format=%H:%M:%S

[MeasureDate]
Measure=Time
Format=%d %b %Y

[MeterFace]
Meter=Shape
Shape=Rectangle 0,0,#ScreenW#,#HeaderH# | Fill Color #EquipmentWhite# | StrokeWidth 0

[MeterBand]
Meter=Shape
Shape=Rectangle 0,0,#ScreenW#,13 | Fill Color #MissionBlue# | StrokeWidth 0

[MeterRule]
Meter=Shape
Shape=Line 0,(#HeaderH#-2),#ScreenW#,(#HeaderH#-2) | StrokeWidth 2 | Stroke Color #DeepBlue#

; Historical Rockwell identity area. The vector mark will replace this
; temporary wordmark as soon as the approved artwork is committed.
[MeterBrand]
Meter=String
MeterStyle=StyleCorporate
X=24
Y=22
W=210
H=40
FontSize=25
FontWeight=700
ClipString=1
Text=ROCKWELL

[MeterBrandDivider]
Meter=Shape
Shape=Rectangle 238,23,5,35 | Fill Color #MissionBlue# | StrokeWidth 0

[MeterSystem]
Meter=String
MeterStyle=StyleEngineering
X=260
Y=23
W=310
H=20
FontSize=10
FontWeight=700
FontColor=#DeepBlue#
ClipString=1
Text=ENGINEERING OPERATIONS SYSTEM

[MeterBuild]
Meter=String
MeterStyle=StyleMuted
X=260
Y=47
W=310
H=14
FontSize=7
ClipString=1
Text=REOS #Version# / BUILD #BuildNumber#

[MeterFacilityLabel]
Meter=String
MeterStyle=StyleSection
X=615
Y=21
Text=FACILITY

[MeterFacility]
Meter=String
MeterStyle=StyleEngineering
X=615
Y=42
FontSize=11
FontWeight=700
Text=#Facility# / #Building#

[MeterStationLabel]
Meter=String
MeterStyle=StyleSection
X=1050
Y=21
Text=WORKSTATION

[MeterStation]
Meter=String
MeterStyle=StyleData
X=1050
Y=42
FontSize=9
Text=#Workstation# / #Console#

[MeterAccessLamp]
Meter=Shape
Shape=Ellipse 1507,36,6,6 | Fill Color #SafetyGreen# | StrokeWidth 1 | Stroke Color #DeepBlue#

[MeterAccess]
Meter=String
MeterStyle=StyleData
X=1525
Y=30
FontSize=8
Text=#AccessClass#

[MeterDate]
Meter=String
MeterStyle=StyleMuted
MeasureName=MeasureDate
X=1878
Y=21
StringAlign=Right
FontSize=8

[MeterTime]
Meter=String
MeterStyle=StyleData
MeasureName=MeasureTime
X=1892
Y=42
StringAlign=Right
FontSize=19
FontWeight=700
FontColor=#DeepBlue#
