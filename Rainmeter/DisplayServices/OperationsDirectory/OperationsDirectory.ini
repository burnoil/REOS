[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=0
OnRefreshAction=[!Move 0 #HeaderH#][!ZPos -2]

@Include=#@#Variables.inc
@Include2=#@#Components\Typography.inc

[MeterShell]
Meter=Shape
Shape=Rectangle 0,0,#NavW#,#BodyH# | Fill Color #EquipmentCream# | StrokeWidth 2 | Stroke Color #DeepBlue#
W=#NavW#
H=#BodyH#

[MeterCap]
Meter=Shape
Shape=Rectangle 0,0,#NavW#,82 | Fill Color #CanaryBlue# | StrokeWidth 0

[MeterCapLine]
Meter=Shape
Shape=Rectangle 0,79,#NavW#,3 | Fill Color #MissionBlue# | StrokeWidth 0

[MeterTitle]
Meter=String
MeterStyle=StyleEngineering
X=24
Y=18
FontSize=14
FontWeight=700
Text=OPERATIONS DIRECTORY

[MeterSubtitle]
Meter=String
MeterStyle=StyleMuted
X=24
Y=49
FontSize=8
FontColor=#DeepBlue#
Text=DISPLAY ASSEMBLY 710-22001 / REV B

[MeterSection1]
Meter=String
MeterStyle=StyleSection
X=24
Y=106
Text=01  PROGRAM OPERATIONS

[MeterRule1]
Meter=Shape
Shape=Line 24,130,276,130 | StrokeWidth 1 | Stroke Color #DividerBlue#

[MeterWorkspace]
Meter=String
MeterStyle=StyleEngineering
X=34
Y=146
FontSize=10
Text=OPERATOR WORKSPACE
LeftMouseUpAction=["explorer.exe" shell:Desktop]

[MeterDocumentControl]
Meter=String
MeterStyle=StyleEngineering
X=34
Y=177
FontSize=10
Text=ENGINEERING DOCUMENT CONTROL
LeftMouseUpAction=["explorer.exe"]

[MeterIncoming]
Meter=String
MeterStyle=StyleEngineering
X=34
Y=208
FontSize=10
Text=INCOMING TECHNICAL DATA
LeftMouseUpAction=["explorer.exe" shell:Downloads]

[MeterSection2]
Meter=String
MeterStyle=StyleSection
X=24
Y=256
Text=02  ENGINEERING APPLICATIONS

[MeterRule2]
Meter=Shape
Shape=Line 24,280,276,280 | StrokeWidth 1 | Stroke Color #DividerBlue#

[MeterTerminal]
Meter=String
MeterStyle=StyleEngineering
X=34
Y=296
FontSize=10
Text=COMMAND OPERATIONS TERMINAL
LeftMouseUpAction=["wt.exe" "powershell.exe"]

[MeterDevelopment]
Meter=String
MeterStyle=StyleEngineering
X=34
Y=327
FontSize=10
Text=SOURCE DEVELOPMENT ENVIRONMENT
LeftMouseUpAction=["code.exe"]

[MeterResources]
Meter=String
MeterStyle=StyleEngineering
X=34
Y=358
FontSize=10
Text=SYSTEM RESOURCE ANALYSIS
LeftMouseUpAction=["taskmgr.exe"]

[MeterEvents]
Meter=String
MeterStyle=StyleEngineering
X=34
Y=389
FontSize=10
Text=OPERATIONS EVENT RECORD
LeftMouseUpAction=["eventvwr.msc"]

[MeterConfiguration]
Meter=String
MeterStyle=StyleEngineering
X=34
Y=420
FontSize=10
Text=CONFIGURATION CONTROL
LeftMouseUpAction=["control.exe"]

[MeterSection3]
Meter=String
MeterStyle=StyleSection
X=24
Y=468
Text=03  COMMUNICATIONS / RESEARCH

[MeterRule3]
Meter=Shape
Shape=Line 24,492,276,492 | StrokeWidth 1 | Stroke Color #DividerBlue#

[MeterCommunications]
Meter=String
MeterStyle=StyleEngineering
X=34
Y=508
FontSize=10
Text=ENGINEERING COMMUNICATIONS
LeftMouseUpAction=["outlook.exe"]

[MeterResearch]
Meter=String
MeterStyle=StyleEngineering
X=34
Y=539
FontSize=10
Text=RESEARCH TERMINAL
LeftMouseUpAction=["chrome.exe"]

[MeterServiceBay]
Meter=Shape
Shape=Rectangle 18,608,264,182,6 | Fill Color #ModuleFace# | StrokeWidth 1 | Stroke Color #DividerBlue#

[MeterServiceBand]
Meter=Shape
Shape=Rectangle 18,608,264,34,6 | Fill Color #RecessFace# | StrokeWidth 0

[MeterServiceTitle]
Meter=String
MeterStyle=StyleSection
X=32
Y=619
Text=DISPLAY SERVICES

[MeterEngageLamp]
Meter=Shape
Shape=Ellipse 34,664,5,5 | Fill Color #SafetyGreen# | StrokeWidth 1 | Stroke Color #DeepBlue#

[MeterEngage]
Meter=String
MeterStyle=StyleData
X=53
Y=655
FontSize=8
Text=ENTER CONSOLE MODE
LeftMouseUpAction=["powershell.exe" -NoProfile -WindowStyle Hidden -ExecutionPolicy Bypass -File "#@#Scripts\EngageREOSShell.ps1"]
ToolTipText=Auto-hide the Windows taskbar and hide desktop icons. Applications continue to behave normally.

[MeterRestoreLamp]
Meter=Shape
Shape=Ellipse 34,700,5,5 | Fill Color #WarningAmber# | StrokeWidth 1 | Stroke Color #DeepBlue#

[MeterRestore]
Meter=String
MeterStyle=StyleData
X=53
Y=691
FontSize=8
Text=EXIT CONSOLE MODE
LeftMouseUpAction=["powershell.exe" -NoProfile -WindowStyle Hidden -ExecutionPolicy Bypass -File "#@#Scripts\RestoreWindowsUI.ps1"]
ToolTipText=Restore the normal Windows taskbar and desktop icons.

[MeterEdit]
Meter=String
MeterStyle=StyleData
X=53
Y=728
FontSize=8
Text=EDIT WORKSTATION CONFIGURATION
LeftMouseUpAction=["notepad.exe" "#@#Variables.inc"]

[MeterPlate]
Meter=Shape
Shape=Rectangle 22,826,256,86,2 | Fill Color #PlateGray# | StrokeWidth 1 | Stroke Color #Fastener#

[MeterPlateText]
Meter=String
MeterStyle=StyleData
X=34
Y=838
W=230
FontSize=7
ClipString=2
Text=ROCKWELL SPACE SYSTEMS#CRLF#DISPLAY DIRECTORY ASSEMBLY#CRLF#P/N 710-22001-02  REV B#CRLF#ASSET #AssetNumber#  QC RELEASED
