[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=0
OnRefreshAction=[!Move 0 (#ScreenH#-#StatusH#)][!ZPos 1]

@Include=#@#Variables.inc
@Include2=#@#Components\Typography.inc

[MeterFace]
Meter=Shape
Shape=Rectangle 0,0,#ScreenW#,#StatusH# | Fill Color #EquipmentWhite# | StrokeWidth 0

[MeterTopRule]
Meter=Shape
Shape=Rectangle 0,0,#ScreenW#,4 | Fill Color #DeepBlue# | StrokeWidth 0

[MeterBottomBand]
Meter=Shape
Shape=Rectangle 0,50,#ScreenW#,10 | Fill Color #MissionBlue# | StrokeWidth 0

[MeterCommLamp]
