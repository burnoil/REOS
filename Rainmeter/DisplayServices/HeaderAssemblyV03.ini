[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=0
OnRefreshAction=[!ZPos -2]

[Metadata]
Name=REOS Header Assembly v0.3
Author=REOS Project
Information=Responsive industrial header assembly for REOS.
Version=0.3.0

[Variables]
@IncludeColors=#@#Theme\Colors.inc
@IncludeTypography=#@#Theme\Typography.inc
@IncludeMaterials=#@#Theme\Materials.inc
@IncludeLayout=#@#Layouts\LayoutEngine.inc

FacilityName=HUNTINGTON BEACH, CALIFORNIA
FacilityGroup=WESTERN OPERATIONS
OperatorName=TODD L.
OperatorDiscipline=ENDPOINT ENGINEERING
ConsoleNumber=04
StationNumber=02
AssetNumber=REWS-8200
BuildNumber=26.0718
AssemblyNumber=750-11802
Revision=H

; Set to 1 after the authentic logo asset is installed at:
; #@#Assets\Rockwell\RockwellInternational.png
UseLogoAsset=0
LogoAsset=#@#Assets\Rockwell\RockwellInternational.png

[MeterHeaderStructure]
Meter=Shape
X=0
Y=0
Shape=Rectangle 0,0,#HeaderW#,#HeaderHeight#,4 | Fill Color #ConsoleStructure# | StrokeWidth 2 | Stroke Color #ConsoleSeam#
Shape2=Line 0,(#HeaderHeight#-3),#HeaderW#,(#HeaderHeight#-3) | StrokeWidth 1 | Stroke Color #ConsoleHighlight#
DynamicVariables=1

[MeterBadgePanel]
Meter=Shape
X=8
Y=8
Shape=Rectangle 0,0,(#BadgeW#-16),(#HeaderHeight#-16),3 | Fill Color #ModuleFaceWarm# | StrokeWidth 1 | Stroke Color #ModuleEdgeDark#
Shape2=Line 2,2,(#BadgeW#-20),2 | StrokeWidth 1 | Stroke Color #ModuleEdgeLight#
DynamicVariables=1

[MeterLogoImage]
Meter=Image
X=22
Y=(#HeaderHeight#*0.20)
W=(#BadgeW#-44)
H=(#HeaderHeight#*0.58)
ImageName=#LogoAsset#
PreserveAspectRatio=1
Hidden=(#UseLogoAsset#=0)
DynamicVariables=1

[MeterLogoFallback]
Meter=String
X=(#BadgeW#*0.50)
Y=(#HeaderHeight#*0.24)
W=(#BadgeW#-32)
Text=ROCKWELL
FontFace=#FontDisplay#
FontSize=(#IsCompact#=1 ? 23 : 28)
FontWeight=#TypeWeightBold#
FontColor=136,38,34,255
StringAlign=Center
AntiAlias=1
Hidden=(#UseLogoAsset#=1)
DynamicVariables=1

[MeterLogoFallbackSub]
Meter=String
X=(#BadgeW#*0.50)
Y=(#HeaderHeight#*0.57)
W=(#BadgeW#-32)
Text=INTERNATIONAL
FontFace=#FontDisplay#
FontSize=(#IsCompact#=1 ? 11 : 13)
FontWeight=#TypeWeightBold#
FontColor=#LabelPrimary#
StringAlign=Center
AntiAlias=1
Hidden=(#UseLogoAsset#=1)
DynamicVariables=1

[MeterSystemPlate]
Meter=Shape
X=#BadgeW#
Y=8
Shape=Rectangle 0,0,#SystemPlateW#,(#HeaderHeight#-16),4 | Fill Color #PlateFace# | StrokeWidth 2 | Stroke Color #PlateEdge#
DynamicVariables=1

[MeterSystemTitle]
Meter=String
X=(#BadgeW#+20)
Y=18
W=(#SystemPlateW#-40)
Text=ENGINEERING OPERATIONS SYSTEM
FontFace=#FontDisplay#
FontSize=(#IsCompact#=1 ? 14 : 17)
FontWeight=#TypeWeightMedium#
FontColor=#CRTPhosphorBright#
AntiAlias=1
ClipString=1
DynamicVariables=1

[MeterSystemBuild]
Meter=String
X=(#BadgeW#+20)
Y=(#HeaderHeight#*0.48)
W=(#SystemPlateW#-40)
Text=REOS  //  BUILD #BuildNumber#  //  REV #Revision#
FontFace=#FontTechnical#
FontSize=(#IsCompact#=1 ? 8 : 10)
FontColor=#CRTPhosphor#
AntiAlias=1
DynamicVariables=1

[MeterSystemGroup]
Meter=String
X=(#BadgeW#+20)
Y=(#HeaderHeight#*0.69)
W=(#SystemPlateW#-40)
Text=ADVANCED SYSTEMS GROUP
FontFace=#FontTechnical#
FontSize=(#IsCompact#=1 ? 7 : 9)
FontColor=#CRTPhosphorDim#
AntiAlias=1
DynamicVariables=1

[MeterIdentityDivider]
Meter=Shape
X=(#BadgeW#+#SystemPlateW#+#RegionGap#)
Y=12
Shape=Line 0,0,0,(#HeaderHeight#-24) | StrokeWidth 1 | Stroke Color #ConsoleSeam#
DynamicVariables=1

[MeterFacilityLabel]
Meter=String
X=(#BadgeW#+#SystemPlateW#+#RegionGap#+18)
Y=15
Text=FACILITY
FontFace=#FontLabel#
FontSize=#TypeMicroSize#
FontWeight=#TypeWeightBold#
FontColor=#LabelSecondary#
AntiAlias=1
DynamicVariables=1

[MeterFacilityValue]
Meter=String
X=(#BadgeW#+#SystemPlateW#+#RegionGap#+18)
Y=34
W=(#HeaderIdentityW#*0.31)
Text=#FacilityName##CRLF##FacilityGroup#
FontFace=#FontTechnical#
FontSize=(#IsCompact#=1 ? 8 : 9)
FontColor=#LabelPrimary#
AntiAlias=1
ClipString=2
DynamicVariables=1

[MeterOperatorLabel]
Meter=String
X=(#BadgeW#+#SystemPlateW#+#RegionGap#+(#HeaderIdentityW#*0.34))
Y=15
Text=OPERATOR
FontFace=#FontLabel#
FontSize=#TypeMicroSize#
FontWeight=#TypeWeightBold#
FontColor=#LabelSecondary#
AntiAlias=1
DynamicVariables=1

[MeterOperatorValue]
Meter=String
X=(#BadgeW#+#SystemPlateW#+#RegionGap#+(#HeaderIdentityW#*0.34))
Y=34
W=(#HeaderIdentityW#*0.27)
Text=#OperatorName##CRLF##OperatorDiscipline#
FontFace=#FontTechnical#
FontSize=(#IsCompact#=1 ? 8 : 9)
FontColor=#LabelPrimary#
AntiAlias=1
ClipString=2
DynamicVariables=1

[MeterConsoleLabel]
Meter=String
X=(#BadgeW#+#SystemPlateW#+#RegionGap#+(#HeaderIdentityW#*0.64))
Y=15
Text=CONSOLE
FontFace=#FontLabel#
FontSize=#TypeMicroSize#
FontWeight=#TypeWeightBold#
FontColor=#LabelSecondary#
AntiAlias=1
DynamicVariables=1

[MeterConsoleValue]
Meter=String
X=(#BadgeW#+#SystemPlateW#+#RegionGap#+(#HeaderIdentityW#*0.64))
Y=34
W=(#HeaderIdentityW#*0.17)
Text=#ConsoleNumber#  /  STATION #StationNumber##CRLF##AssetNumber#
FontFace=#FontTechnical#
FontSize=(#IsCompact#=1 ? 8 : 9)
FontColor=#LabelPrimary#
AntiAlias=1
ClipString=2
DynamicVariables=1

[MeasureTime]
Measure=Time
Format=%H:%M:%S

[MeasureDate]
Measure=Time
Format=%d %b %Y

[MeterSessionLabel]
Meter=String
X=(#BadgeW#+#SystemPlateW#+#RegionGap#+(#HeaderIdentityW#*0.83))
Y=15
Text=SESSION
FontFace=#FontLabel#
FontSize=#TypeMicroSize#
FontWeight=#TypeWeightBold#
FontColor=#LabelSecondary#
AntiAlias=1
DynamicVariables=1

[MeterSessionValue]
Meter=String
MeasureName=MeasureTime
MeasureName2=MeasureDate
X=(#BadgeW#+#SystemPlateW#+#RegionGap#+(#HeaderIdentityW#*0.83))
Y=34
W=(#HeaderIdentityW#*0.16)
Text=%1#CRLF#%2
FontFace=#FontTechnical#
FontSize=(#IsCompact#=1 ? 8 : 9)
FontColor=#LabelPrimary#
AntiAlias=1
ClipString=2
DynamicVariables=1

[MeterAssemblyMark]
Meter=String
X=(#HeaderW#-12)
Y=(#HeaderHeight#-12)
Text=ASSEMBLY #AssemblyNumber#  /  QC VERIFIED
FontFace=#FontTechnical#
FontSize=#TypeMicroSize#
FontColor=#InspectionGreen#
StringAlign=RightBottom
AntiAlias=1
DynamicVariables=1
