[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=0
OnRefreshAction=[!Move (#ScreenW#-#RailW#) #HeaderH#][!ZPos -2]

@Include=#@#Variables.inc
@Include2=#@#Components\Typography.inc

[MeasureCPU]
Measure=CPU
Processor=0

[MeasureRAM]
Measure=PhysicalMemory

[MeasureUptime]
Measure=Uptime
Format=%4!i! HRS %02!i! MIN

[MeasureDriveA]
Measure=FreeDiskSpace
Drive=#Drive1#
Total=0

[MeasureDriveB]
Measure=FreeDiskSpace
Drive=#Drive2#
Total=0

[MeasureNetIn]
Measure=NetIn
Interface=Best

[MeasureNetOut]
Measure=NetOut
Interface=Best

[MeterShell]
Meter=Shape
Shape=Rectangle 0,0,#RailW#,#BodyH# | Fill Color #EquipmentCream# | StrokeWidth 2 | Stroke Color #DeepBlue#
W=#RailW#
H=#BodyH#

[MeterCap]
Meter=Shape
Shape=Rectangle 0,0,#RailW#,82 | Fill Color #CanaryBlue# | StrokeWidth 0

[MeterCapLine]
Meter=Shape
Shape=Rectangle 0,79,#RailW#,3 | Fill Color #MissionBlue# | StrokeWidth 0

[MeterTitle]
Meter=String
MeterStyle=StyleEngineering
X=22
Y=18
FontSize=14
FontWeight=700
Text=WORKSTATION SYSTEMS

[MeterSubtitle]
Meter=String
MeterStyle=StyleMuted
X=22
Y=49
FontSize=8
FontColor=#DeepBlue#
Text=INSTRUMENT ASSEMBLY 730-11004 / REV E

