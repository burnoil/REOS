[Rainmeter]
Update=5000
AccurateText=1
DynamicWindowSize=1
OnRefreshAction=[!CommandMeasure MeasureStartTelemetry "Run"]
OnUpdateAction=[!Refresh "REOS\Modules\WorkstationHealth"][!Refresh "REOS\Modules\EngineeringNetwork"]

[Metadata]
Name=REOS Telemetry Bridge v0.3
Author=REOS Project
Information=Starts the shared telemetry service and refreshes display consumers.
Version=0.3.1

[MeasureStartTelemetry]
Measure=Plugin
Plugin=RunCommand
Program=powershell.exe
Parameter=-NoProfile -ExecutionPolicy Bypass -WindowStyle Hidden -File "#@#Scripts\REOS-Telemetry.ps1" -ResourcePath "#@#" -IntervalSeconds 5
State=Hide
OutputType=UTF8

[MeterServiceMarker]
Meter=String
Text=REOS TELEMETRY BRIDGE
FontSize=1
FontColor=0,0,0,1
W=1
H=1
